# Blog v2 Nginx production configuration
#
# Usage:
#   sudo ln -s /etc/nginx/sites-available/blog.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificate setup (first time):
#   sudo certbot --nginx -d ifoxchen.com -d www.ifoxchen.com

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ifoxchen.com www.ifoxchen.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ifoxchen.com www.ifoxchen.com;

    # SSL (Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/ifoxchen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ifoxchen.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (send after HTTPS confirmed working)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Content Security Policy (adjust as needed)
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com;
        img-src 'self' data: https:;
        font-src 'self' data: cdnjs.cloudflare.com;
        connect-src 'self' cdn.jsdelivr.net;
        frame-ancestors 'none';
    " always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;

    # Uploads (long-lived cache)
    location /uploads/ {
        proxy_pass http://localhost:8787;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Front blog (Express 5 legacy)
    location / {
        proxy_pass http://localhost:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # v2 Admin API
    location /api/v2/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # v2 Admin SPA (client-side routing)
    location /admin/ {
        proxy_pass http://localhost:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA: fallback to index.html for non-file routes
        proxy_intercept_errors on;
        error_page 404 /admin/index.html;
    }

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
