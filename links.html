    <script>
      (function(){
        const grid = document.getElementById('link-grid');
        if(!grid) return;
        
        async function loadLinks(){
          try{
            const res = await fetch('/api/links');
            const data = await res.json();
            renderLinks(data.links);
          }catch(e){
            console.warn(e);
          }
        }
        
        function renderLinks(links){
          if(!links || links.length===0){
            grid.innerHTML = '<p style="color:var(--color-text-muted);text-align:center;grid-column:1/-1">暂无链接</p>';
            return;
          }
          grid.innerHTML = links.map(link => {
            const sizeClass = 'link-' + (link.iconSize||'1x1');
            const iconHtml = link.icon 
              ? `<img src="${escapeHtml(link.icon)}" alt="${escapeHtml(link.title)}" class="link-icon-img" />`
              : `<span class="link-icon-text">${escapeHtml(link.title.charAt(0))}</span>`;
            return `<a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" class="link-card ${sizeClass}">${iconHtml}<span class="link-title">${escapeHtml(link.title)}</span></a>`;
          }).join('');
        }
        
        function escapeHtml(s){
          return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        
        loadLinks();
      })();
    </script>
    <style>
      .link-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: var(--space-4);
      }
      .link-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        text-decoration: none;
        color: var(--color-text);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      .link-card::before{
        content:"";
        position:absolute;
        top:0;left:0;right:0;height:2px;
        background:linear-gradient(90deg,var(--color-accent),transparent);
        opacity:0;
        transition:opacity 0.3s;
      }
      .link-card:hover{
        border-color:var(--color-accent);
        transform:translateY(-3px);
        box-shadow:var(--glow-accent);
      }
      .link-card:hover::before{opacity:1}
      .link-icon-img{
        width:48px;height:48px;
        object-fit:contain;
        filter:grayscale(100%) brightness(0.9) saturate(0.8);
        transition:filter 0.3s;
        border-radius:var(--radius-sm);
      }
      .link-card:hover .link-icon-img{
        filter:grayscale(0%) brightness(1) saturate(1);
      }
      .link-icon-text{
        width:48px;height:48px;
        display:flex;align-items:center;justify-content:center;
        background:var(--color-accent-dim);
        border:1px solid var(--color-accent);
        border-radius:var(--radius-md);
        font-family:var(--font-display);
        font-size:1.5rem;
        color:var(--color-accent);
      }
      .link-title{
        margin-top:var(--space-2);
        font-size:var(--text-caption);
        font-weight:600;
        text-align:center;
        color:var(--color-text);
      }
      .link-card:hover .link-title{color:var(--color-accent)}
      /* size variants */
      .link-1x1{grid-column:auto;}
      .link-2x1{grid-column:span 2;}
      .link-1x2{grid-row:span 2;}
      .link-2x2{grid-column:span 2;grid-row:span 2;}
      @media(max-width:640px){
        .link-2x1,.link-2x2{grid-column:auto}
        .link-1x2{grid-row:auto}
      }
    </style>
