      <div class="site-header__inner">
        <a class="site-logo" href="index.html" id="site-logo">ifoxchen's blog</a>
        <nav class="nav-desktop" aria-label="主导航">
          <a href="index.html">首页</a>
          <div class="nav-dropdown">
            <a href="archive.html" class="nav-dropdown__trigger">归档 ▾</a>
            <ul class="nav-dropdown__menu">
              <li><a href="archive.html">归档</a></li>
              <li><a href="archive.html?type=category">分类</a></li>
              <li><a href="archive.html?type=tag">标签</a></li>
            </ul>
          </div>
          <div class="nav-dropdown">
            <a href="links.html" class="nav-dropdown__trigger" aria-current="page">导航 ▾</a>
            <ul class="nav-dropdown__menu" id="nav-links-menu">
              <li><a href="links.html">查看全部</a></li>

        <button class="theme-toggle" id="theme-btn" aria-label="切换主题">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.36 14.25 2 14 2h-4c-.25 0-.46.36-.49.65l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.63c-.04.32-.07.65-.07.97s.03.65.07.97l-2.11 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.29.24.65.49.65h4c.25 0 .46-.36.49-.65l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63z"/></svg>

    <main class="site-main">
      <section class="hero">
        <h1 class="hero__title">站外导航</h1>
        <p class="hero__lede">快速访问常用站点与工具。</p>
      </section>

      <section aria-labelledby="links-heading">
        <div class="link-grid" id="link-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <span>© 2026 ifoxchen's blog</span>
        <span>
          <a href="/rss.xml">RSS</a>
          ·
          <a href="components.html">组件索引</a>
        </span>
      </div>
    </footer>
    
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/blog.js"></script>
    <script>
      (function(){
        const grid = document.getElementById('link-grid');
        if(!grid) return;
        
        async function loadLinks(){
          try{
            const res = await fetch('/api/links');
            const data = await res.json();
            grid.innerHTML = window.BlogUtils.renderLinkCards(data.links);
          }catch(e){
            console.warn(e);
          }
        }

        loadLinks();
      })();
    </script>
    <style>
      .link-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: var(--space-4);
      }
      .link-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        text-decoration: none;
        color: var(--color-text);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      .link-card::before{
        content:"";
        position:absolute;
        top:0;left:0;right:0;height:2px;
        background:linear-gradient(90deg,var(--color-accent),transparent);
        opacity:0;
        transition:opacity 0.3s;
      }
      .link-card:hover{
        border-color:var(--color-accent);
        transform:translateY(-3px);
        box-shadow:var(--glow-accent);
      }
      .link-card:hover::before{opacity:1}
      .link-icon-img{
        width:48px;height:48px;
        object-fit:contain;
        filter:grayscale(100%) brightness(0.9) saturate(0.8);
        transition:filter 0.3s;
        border-radius:var(--radius-sm);
      }
      .link-card:hover .link-icon-img{
        filter:grayscale(0%) brightness(1) saturate(1);
      }
      .link-icon-text{
        width:48px;height:48px;
        display:flex;align-items:center;justify-content:center;
        background:var(--color-accent-dim);
        border:1px solid var(--color-accent);
        border-radius:var(--radius-md);
        font-family:var(--font-display);
        font-size:1.5rem;
        color:var(--color-accent);
      }
      .link-title{
        margin-top:var(--space-2);
        font-size:var(--text-caption);
        font-weight:600;
        text-align:center;
        color:var(--color-text);
      }
      .link-card:hover .link-title{color:var(--color-accent)}
      /* size variants */
      .link-1x1{grid-column:auto;}
      .link-2x1{grid-column:span 2;}
      .link-1x2{grid-row:span 2;}
      .link-2x2{grid-column:span 2;grid-row:span 2;}
      @media(max-width:640px){
        .link-2x1,.link-2x2{grid-column:auto}
        .link-1x2{grid-row:auto}
      }
    </style>
  </body>
</html>
