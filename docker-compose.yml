services:
  blog:
    build: .
    image: ghcr.io/ifoxchen-glitch/blog-design-v2.0:latest
    container_name: blog
    ports:
      - "8787:8787"
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - ADMIN_PORT=3000
      - BIND_HOST=${BIND_HOST:-0.0.0.0}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      # Open WebUI 外部服务地址
      - OPEN_WEBUI_URL=http://open-webui:8080
    volumes:
      - blog-data:/app/server/db
      - blog-uploads:/app/server/public/uploads
    restart: unless-stopped
    depends_on:
      - open-webui
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - DATA_DIR=/app/backend/data
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMOUS_TELEMETRY=false
      # 禁用内置认证，由 blog 代理处理
      - WEBUI_AUTH=false
    volumes:
      - openwebui-data:/app/backend/data
    restart: unless-stopped

volumes:
  blog-data:
  blog-uploads:
  openwebui-data:
