services:
  blog:
    build: .
    image: ghcr.io/ifoxchen-glitch/blog-design-v2.0:latest
    container_name: blog
    ports:
      - "8787:8787"
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - ADMIN_PORT=3000
      - BIND_HOST=${BIND_HOST:-0.0.0.0}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      - OPEN_WEBUI_PORT=${OPEN_WEBUI_PORT:-8080}
      - OPEN_WEBUI_HOST=${OPEN_WEBUI_HOST:-127.0.0.1}
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMOUS_TELEMETRY=false
    volumes:
      - blog-data:/app/server/db
      - blog-uploads:/app/server/public/uploads
      - openwebui-data:/app/server/open-webui/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  blog-data:
  blog-uploads:
  openwebui-data:

volumes:
  blog-data:
  blog-uploads:
